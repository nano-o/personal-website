name: Deploy site

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: deploy-site
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      ZOLA_IMAGE: ghcr.io/getzola/zola:v0.22.1

    steps:
      - name: Check out repository
        uses: actions/checkout@v6.0.3

      - name: Pull Zola image
        run: docker pull "$ZOLA_IMAGE"

      - name: Check site
        run: |
          docker run --rm \
            --user "$(id -u):$(id -g)" \
            --volume "$PWD:/project" \
            --workdir /project \
            "$ZOLA_IMAGE" check --skip-external-links

      - name: Build site
        run: |
          docker run --rm \
            --user "$(id -u):$(id -g)" \
            --volume "$PWD:/project" \
            --workdir /project \
            "$ZOLA_IMAGE" build

      - name: Install lftp
        run: sudo apt-get update && sudo apt-get install -y lftp

      - name: Deploy over FTPS
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
          FTP_SERVER_DIR: ${{ secrets.FTP_SERVER_DIR }}
        run: |
          require_secret() {
            local name="$1"
            local value="${!name:-}"

            if [ -z "$value" ]; then
              echo "::error title=Missing GitHub secret::$name is not configured or is empty."
              exit 1
            fi
          }

          require_secret FTP_SERVER
          require_secret FTP_USERNAME
          require_secret FTP_PASSWORD
          require_secret FTP_SERVER_DIR

          lftp -u "$FTP_USERNAME","$FTP_PASSWORD" "$FTP_SERVER" -e "
            set ftp:ssl-force true
            set ftp:ssl-protect-data true
            set ssl:verify-certificate true
            mirror -R --verbose public/ \"$FTP_SERVER_DIR\"
            bye
          "
