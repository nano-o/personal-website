name: Deploy site

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: deploy-site
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      ZOLA_VERSION: 0.22.1

    steps:
      - name: Check out repository
        uses: actions/checkout@v6.0.3

      - name: Install Zola
        run: |
          curl -fsSL -o /tmp/zola.tar.gz "https://github.com/getzola/zola/releases/download/v${ZOLA_VERSION}/zola-v${ZOLA_VERSION}-x86_64-unknown-linux-gnu.tar.gz"
          tar -xzf /tmp/zola.tar.gz -C /tmp
          sudo install /tmp/zola /usr/local/bin/zola
          zola --version

      - name: Check site
        run: zola check --skip-external-links

      - name: Build site
        run: zola build

      - name: Install lftp
        run: sudo apt-get update && sudo apt-get install -y lftp

      - name: Deploy over FTPS
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
          FTP_SERVER_DIR: ${{ secrets.FTP_SERVER_DIR }}
        run: |
          test -n "$FTP_SERVER"
          test -n "$FTP_USERNAME"
          test -n "$FTP_PASSWORD"
          test -n "$FTP_SERVER_DIR"
          lftp -u "$FTP_USERNAME","$FTP_PASSWORD" "$FTP_SERVER" -e "
            set ftp:ssl-force true
            set ftp:ssl-protect-data true
            set ssl:verify-certificate true
            mirror -R --verbose public/ \"$FTP_SERVER_DIR\"
            bye
          "
