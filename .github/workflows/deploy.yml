name: Deploy site

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: deploy-site
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      ZOLA_IMAGE: ghcr.io/getzola/zola:v0.22.1@sha256:b491a8bec3773815bdcdbbfbc2d0d60eda880ef550c4cc512349ab6451fbd72a
      SITE_URL: https://www.losa.fr

    steps:
      - name: Check out repository
        uses: actions/checkout@v6.0.3

      - name: Pull Zola image
        run: docker pull "$ZOLA_IMAGE"

      - name: Check site
        run: |
          docker run --rm \
            --user "$(id -u):$(id -g)" \
            --volume "$PWD:/project" \
            --workdir /project \
            "$ZOLA_IMAGE" check --skip-external-links

      - name: Build site
        run: |
          docker run --rm \
            --user "$(id -u):$(id -g)" \
            --volume "$PWD:/project" \
            --workdir /project \
            "$ZOLA_IMAGE" build

      - name: Write deploy marker
        run: printf '%s\n' "$GITHUB_SHA" > public/deploy-check.txt

      - name: Install SFTP tools
        run: sudo apt-get update && sudo apt-get install -y lftp openssh-client

      - name: Deploy over SFTP
        timeout-minutes: 15
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
          FTP_SERVER_DIR: ${{ secrets.FTP_SERVER_DIR }}
          SFTP_KNOWN_HOSTS: ${{ secrets.SFTP_KNOWN_HOSTS }}
        run: |
          require_secret() {
            local name="$1"
            local value="${!name:-}"

            if [ -z "$value" ]; then
              echo "::error title=Missing GitHub secret::$name is not configured or is empty."
              exit 1
            fi
          }

          require_secret FTP_SERVER
          require_secret FTP_USERNAME
          require_secret FTP_PASSWORD
          require_secret FTP_SERVER_DIR

          if [[ "$FTP_SERVER_DIR" == *\"* || "$FTP_SERVER_DIR" == *"'"* ]]; then
            echo "::error title=Invalid FTP_SERVER_DIR::FTP_SERVER_DIR must not contain quotes. Use a bare path like www/."
            exit 1
          fi

          if [[ "$FTP_SERVER_DIR" =~ [[:space:]] ]]; then
            echo "::error title=Invalid FTP_SERVER_DIR::FTP_SERVER_DIR must not contain whitespace. Use a bare path like www/."
            exit 1
          fi

          install -m 700 -d "$HOME/.ssh"

          if [ -n "$SFTP_KNOWN_HOSTS" ]; then
            printf '%s\n' "$SFTP_KNOWN_HOSTS" > "$HOME/.ssh/known_hosts"
            chmod 600 "$HOME/.ssh/known_hosts"
            strict_host_key_checking=yes
          else
            strict_host_key_checking=accept-new
          fi

          sftp_connect_program="$(mktemp)"
          {
            printf '%s\n' '#!/usr/bin/env bash'
            printf '%s\n' 'exec ssh -a -x \'
            printf '  %s\n' '-o ConnectTimeout=30 \'
            printf '  %s\n' '-o ServerAliveInterval=15 \'
            printf '  %s\n' '-o ServerAliveCountMax=2 \'
            printf '  %s\n' "-o StrictHostKeyChecking=$strict_host_key_checking \\"
            printf '  %s\n' '"$@"'
          } > "$sftp_connect_program"
          chmod 700 "$sftp_connect_program"

          server_url="$FTP_SERVER"
          case "$server_url" in
            sftp://*) ;;
            *) server_url="sftp://$server_url" ;;
          esac

          lftp -u "$FTP_USERNAME","$FTP_PASSWORD" "$server_url" -e "
            set cmd:fail-exit true
            set net:max-retries 2
            set net:reconnect-interval-base 5
            set net:reconnect-interval-max 15
            set net:timeout 30
            set sftp:connect-program $sftp_connect_program
            mirror -R --verbose public/ $FTP_SERVER_DIR
            put -O $FTP_SERVER_DIR public/.htaccess
            bye
          "

      - name: Verify deployed site
        run: |
          marker_url="${SITE_URL%/}/deploy-check.txt?sha=$GITHUB_SHA"
          site_url="${SITE_URL%/}/"
          http_url="http://${site_url#https://}"

          marker_verified=false

          for attempt in 1 2 3 4 5; do
            marker="$(curl --fail --silent --show-error --location --max-time 30 "$marker_url" || true)"
            marker="$(printf '%s' "$marker" | tr -d '\r\n')"

            if [ "$marker" = "$GITHUB_SHA" ]; then
              marker_verified=true
              break
            fi

            sleep 10
          done

          if [ "$marker_verified" != true ]; then
            echo "::error title=Deployment verification failed::Uploaded files were not served from $marker_url."
            exit 1
          fi

          headers="$(curl --fail --silent --show-error --dump-header - --output /dev/null --max-time 30 "$site_url")"

          if ! printf '%s\n' "$headers" | grep -iq '^strict-transport-security: .*max-age='; then
            echo "::error title=HSTS verification failed::No Strict-Transport-Security header was served from $site_url."
            exit 1
          fi

          redirect_url="$(curl --silent --show-error --output /dev/null --write-out '%{redirect_url}' --max-time 30 "$http_url")"

          if [ "$redirect_url" != "$site_url" ]; then
            echo "::error title=HTTPS redirect verification failed::$http_url redirected to '$redirect_url' instead of '$site_url'."
            exit 1
          fi
